name: TFM DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu_latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependecies
      run: dotnet restore ./tfm-app-vulnerable.csproj --locked-mode

    - name: Build
      run: dotnet build ./tfm-app-vulnerable.csproj --configuration Release --no-restore
