name: TFM DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependecies
      run: dotnet restore ./tfm-app-vulnerable.csproj --locked-mode

    - name: Build
      run: dotnet build ./tfm-app-vulnerable.csproj --configuration Release --no-restore
    
    - name: Generate SBOM with CycloneDX
      run: dotnet cyclonedx ./tfm-app-vulnerable.csproj --json --output ./sbom
    
    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        name: cyclonedx-sbom
        path: ./sbom/bom.json
