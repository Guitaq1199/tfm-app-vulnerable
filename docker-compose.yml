services:
  dtrack:
    image: dependencytrack/bundled:latest
    container_name: dependencytrack
    ports:
      - "8080:8080"
    environment:
      - API_BASE_URL=http://localhost:8080
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/version"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s